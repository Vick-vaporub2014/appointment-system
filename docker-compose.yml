
services:
  api:
    image: vickvaporub/appointment-system:latest
    container_name: api
    ports:
      - "8080:8080"
    environment:
      - DOTNET_ENVIRONMENT=Docker
    depends_on:
      - db
    restart: always

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: db
    environment:
      - SA_PASSWORD=ContraSecreta123
      - ACCEPT_EULA=Y
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql #Para que los datos de la DB no se borren
    restart: always

volumes:
  sql_data:


