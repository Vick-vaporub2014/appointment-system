
services:
  api:
    build: .
    ports:
      - "8080:80"
    environment:
      - DOTNET_ENVIRONMENT=Docker
    depends_on:
      - db

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - SA_PASSWORD=ContraSecreta123
      - ACCEPT_EULA=Y
    ports:
      - "1433:1433"
    volumes:
    - sql_data:/var/opt/mssql #Para que los datos de la DB no se borren
volumes:
  sql_data:


